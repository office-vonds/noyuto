<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family: "Noto Sans JP", "Yu Gothic", "Hiragino Sans", sans-serif;
        color: #fff;
      }
      .center-wrap {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
      }
      #title {
        font-size: 120px;
        font-weight: 700;
        letter-spacing: 0.06em;
        opacity: 0;
      }
      #subtitle {
        font-size: 56px;
        font-weight: 400;
        letter-spacing: 0.08em;
        color: #d4af37;
        opacity: 0;
      }
      #accent-line {
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, #d4af37, transparent);
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
    >
      <div class="center-wrap">
        <div id="title" class="clip" data-start="0" data-duration="10" data-track-index="1">
          株式会社オフィスVONDS
        </div>
        <div id="accent-line" class="clip" data-start="2.5" data-duration="7.5" data-track-index="2"></div>
        <div id="subtitle" class="clip" data-start="3" data-duration="7" data-track-index="3">
          Google広告運用代行 × LP制作
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Title: fade-in 0→1.2s
      tl.to("#title", { opacity: 1, duration: 1.2, ease: "power2.out" }, 0);

      // Accent line: expand 2.5→3.3s
      tl.to("#accent-line", { width: 600, opacity: 1, duration: 0.8, ease: "power2.out" }, 2.5);

      // Subtitle: slide-in from left 3→4s
      tl.fromTo("#subtitle",
        { x: -80 },
        { opacity: 1, x: 0, duration: 1, ease: "power3.out" },
        3
      );

      // Hold (both visible) 4→8s — no tween needed

      // Fade out all 8.5→10s
      tl.to(["#title", "#subtitle", "#accent-line"], {
        opacity: 0,
        duration: 1.5,
        ease: "power2.in",
      }, 8.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
