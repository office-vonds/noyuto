<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #05060c;
        font-family: "Noto Sans JP", sans-serif;
        color: #fff;
      }

      /* --- Stage: Ken Burns zoom-out container --- */
      #stage {
        position: absolute;
        inset: 0;
        transform-origin: center center;
      }

      /* --- Background layers --- */
      .bg-radial {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 50% 50%, #1a1d3a 0%, #0a0b1e 45%, #05060c 100%);
      }
      .bg-grain {
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.82  0 0 0 0 0.69  0 0 0 0 0.22  0 0 0 0.08 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        opacity: 0.25;
        mix-blend-mode: overlay;
      }
      .bg-vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
      }

      /* --- Cinematic gold frame lines --- */
      .gold-bar {
        position: absolute;
        left: 8%;
        right: 8%;
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, #d4af37 15%, #f3d98a 50%, #d4af37 85%, transparent 100%);
        opacity: 0;
        transform: scaleX(0);
        transform-origin: center;
      }
      #gold-top { top: 8%; }
      #gold-bottom { bottom: 8%; }

      /* --- Center content --- */
      .center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
      }

      /* Monogram */
      #mono {
        font-size: 160px;
        font-weight: 900;
        letter-spacing: 0.2em;
        color: transparent;
        background: linear-gradient(180deg, #fff9e6 0%, #f3d98a 45%, #d4af37 60%, #8a6e1f 100%);
        -webkit-background-clip: text;
        background-clip: text;
        opacity: 0;
        filter: drop-shadow(0 0 24px rgba(212, 175, 55, 0.35));
        text-indent: 0.2em;
      }

      /* Title */
      #title {
        font-size: 88px;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: transparent;
        background: linear-gradient(180deg, #ffffff 0%, #f4f0e0 55%, #d4af37 100%);
        -webkit-background-clip: text;
        background-clip: text;
        opacity: 0;
      }

      /* Divider */
      #divider {
        width: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, #d4af37 50%, transparent);
        opacity: 0;
      }

      /* Subtitle */
      #subtitle {
        font-size: 40px;
        font-weight: 300;
        letter-spacing: 0.44em;
        color: #e8e4d4;
        opacity: 0;
      }

      /* CTA */
      #cta {
        font-size: 28px;
        font-weight: 400;
        letter-spacing: 0.22em;
        color: #d4af37;
        opacity: 0;
        margin-top: 16px;
      }

      /* Corner marks (cinematic) */
      .corner {
        position: absolute;
        width: 36px;
        height: 36px;
        border-color: #d4af37;
        opacity: 0;
      }
      #corner-tl { top: 10%; left: 10%; border-top: 1px solid; border-left: 1px solid; }
      #corner-tr { top: 10%; right: 10%; border-top: 1px solid; border-right: 1px solid; }
      #corner-bl { bottom: 10%; left: 10%; border-bottom: 1px solid; border-left: 1px solid; }
      #corner-br { bottom: 10%; right: 10%; border-bottom: 1px solid; border-right: 1px solid; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="12"
      data-width="1920"
      data-height="1080"
    >
      <div id="stage" class="clip" data-start="0" data-duration="12" data-track-index="1">
        <div class="bg-radial"></div>
        <div class="bg-grain"></div>
        <div class="bg-vignette"></div>

        <div id="gold-top" class="gold-bar clip" data-start="0.2" data-duration="11.8" data-track-index="2"></div>
        <div id="gold-bottom" class="gold-bar clip" data-start="0.2" data-duration="11.8" data-track-index="3"></div>

        <div id="corner-tl" class="corner clip" data-start="0.6" data-duration="11.4" data-track-index="4"></div>
        <div id="corner-tr" class="corner clip" data-start="0.6" data-duration="11.4" data-track-index="5"></div>
        <div id="corner-bl" class="corner clip" data-start="0.6" data-duration="11.4" data-track-index="6"></div>
        <div id="corner-br" class="corner clip" data-start="0.6" data-duration="11.4" data-track-index="7"></div>

        <div class="center">
          <div id="mono" class="clip" data-start="0.8" data-duration="3.5" data-track-index="8">V</div>
          <div id="title" class="clip" data-start="3.8" data-duration="8.2" data-track-index="9">株式会社オフィスVONDS</div>
          <div id="divider" class="clip" data-start="4.8" data-duration="7.2" data-track-index="10"></div>
          <div id="subtitle" class="clip" data-start="5.2" data-duration="6.8" data-track-index="11">Google 広告運用代行 × LP 制作</div>
          <div id="cta" class="clip" data-start="7.4" data-duration="4.6" data-track-index="12">クライアントのCV最大化を設計する</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Ken Burns: 全編で緩やかにズームアウト
      tl.fromTo("#stage",
        { scale: 1.08 },
        { scale: 1.0, duration: 12, ease: "none" },
        0
      );

      // Gold frame bars expand
      tl.to(["#gold-top", "#gold-bottom"], {
        scaleX: 1, opacity: 1, duration: 1.4, ease: "power3.out", stagger: 0.05,
      }, 0.2);

      // Corner marks fade in
      tl.to([".corner"], {
        opacity: 0.7, duration: 0.8, ease: "power2.out", stagger: 0.08,
      }, 0.6);

      // Monogram "V": scale + fade in
      tl.fromTo("#mono",
        { scale: 0.85, y: 8 },
        { scale: 1, y: 0, opacity: 1, duration: 1.4, ease: "power3.out" },
        0.8
      );
      // Monogram fade out
      tl.to("#mono", { opacity: 0, scale: 1.06, duration: 0.7, ease: "power2.in" }, 3.6);

      // Title fade-up
      tl.fromTo("#title",
        { y: 24 },
        { y: 0, opacity: 1, duration: 1.2, ease: "power3.out" },
        3.9
      );

      // Divider expand
      tl.to("#divider", { width: 520, opacity: 1, duration: 0.9, ease: "power3.out" }, 4.8);

      // Subtitle fade-up
      tl.fromTo("#subtitle",
        { y: 16 },
        { y: 0, opacity: 1, duration: 1.1, ease: "power3.out" },
        5.2
      );

      // CTA fade-in
      tl.fromTo("#cta",
        { y: 12 },
        { y: 0, opacity: 1, duration: 1.0, ease: "power2.out" },
        7.4
      );

      // Final fade-out: 全要素
      tl.to(
        ["#title", "#subtitle", "#divider", "#cta", ".corner", "#gold-top", "#gold-bottom"],
        { opacity: 0, duration: 1.4, ease: "power2.in" },
        10.4
      );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
