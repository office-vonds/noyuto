<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #05060c;
        font-family: "Noto Sans JP", sans-serif;
        color: #fff;
      }

      /* --- Scenes: absolute stacked layers --- */
      .scene {
        position: absolute;
        inset: 0;
        overflow: hidden;
        opacity: 0;
      }

      .bg-image {
        position: absolute;
        inset: -5%;
        width: 110%;
        height: 110%;
        background-size: cover;
        background-position: center center;
        filter: brightness(0.55) saturate(1.05);
      }

      /* Vignette over every scene */
      .scene::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 50%, transparent 35%, rgba(0,0,0,0.70) 100%),
          linear-gradient(180deg, rgba(5,6,12,0.35) 0%, transparent 25%, transparent 75%, rgba(5,6,12,0.55) 100%);
        pointer-events: none;
      }

      /* Grain overlay */
      .scene::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.82  0 0 0 0 0.69  0 0 0 0 0.22  0 0 0 0.08 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        opacity: 0.18;
        mix-blend-mode: overlay;
        pointer-events: none;
      }

      /* Scene backgrounds */
      #s1 .bg-image { background-image: url("../../assets/photos/office-meeting.jpg"); }
      #s2 .bg-image { background-image: url("../../assets/photos/laptop-person.jpg"); }
      #s3 .bg-image { background-image: url("../../assets/photos/handshake-business.jpg"); }
      #s4 .bg-image { background-image: url("../../assets/photos/analytics-dashboard.jpg"); }
      #s5 .bg-image { background-image: url("../../assets/photos/city-skyline.jpg"); }

      /* Cinematic gold frame */
      .gold-bar {
        position: absolute;
        left: 6%;
        right: 6%;
        height: 1px;
        background: linear-gradient(90deg, transparent, #d4af37 20%, #f3d98a 50%, #d4af37 80%, transparent);
        opacity: 0;
        z-index: 20;
      }
      #gold-top { top: 6%; }
      #gold-bottom { bottom: 6%; }

      .corner {
        position: absolute;
        width: 40px; height: 40px;
        border-color: #d4af37;
        opacity: 0;
        z-index: 20;
      }
      #ct-tl { top: 8%; left: 8%; border-top: 1px solid; border-left: 1px solid; }
      #ct-tr { top: 8%; right: 8%; border-top: 1px solid; border-right: 1px solid; }
      #ct-bl { bottom: 8%; left: 8%; border-bottom: 1px solid; border-left: 1px solid; }
      #ct-br { bottom: 8%; right: 8%; border-bottom: 1px solid; border-right: 1px solid; }

      /* Text layers (in front of scene) */
      .text-wrap {
        position: absolute;
        left: 10%;
        right: 10%;
        bottom: 22%;
        z-index: 10;
      }
      .eyebrow {
        font-size: 22px;
        letter-spacing: 0.52em;
        color: #d4af37;
        opacity: 0;
        margin-bottom: 18px;
        text-transform: uppercase;
      }
      .headline {
        font-size: 76px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: transparent;
        background: linear-gradient(180deg, #ffffff 0%, #f4f0e0 60%, #d4af37 100%);
        -webkit-background-clip: text;
        background-clip: text;
        opacity: 0;
        line-height: 1.2;
        max-width: 1400px;
      }
      .sub {
        font-size: 28px;
        font-weight: 300;
        color: #e8e4d4;
        letter-spacing: 0.14em;
        opacity: 0;
        margin-top: 22px;
        max-width: 1200px;
      }

      /* Center hero (scene 1 + 6) */
      .center-hero {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        text-align: center;
      }
      .mono {
        font-size: 220px;
        font-weight: 900;
        letter-spacing: 0.2em;
        color: transparent;
        background: linear-gradient(180deg, #fff9e6 0%, #f3d98a 45%, #d4af37 60%, #8a6e1f 100%);
        -webkit-background-clip: text;
        background-clip: text;
        opacity: 0;
        filter: drop-shadow(0 0 28px rgba(212, 175, 55, 0.45));
        text-indent: 0.2em;
      }
      .brand-title {
        font-size: 90px;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: transparent;
        background: linear-gradient(180deg, #ffffff 0%, #f4f0e0 55%, #d4af37 100%);
        -webkit-background-clip: text;
        background-clip: text;
        opacity: 0;
        margin-top: 20px;
      }
      .brand-divider {
        width: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, #d4af37, transparent);
        opacity: 0;
        margin: 28px 0 24px;
      }
      .brand-tagline {
        font-size: 38px;
        font-weight: 300;
        letter-spacing: 0.36em;
        color: #e8e4d4;
        opacity: 0;
      }
      .brand-cta {
        font-size: 30px;
        font-weight: 400;
        letter-spacing: 0.22em;
        color: #d4af37;
        opacity: 0;
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1920"
      data-height="1080"
    >
      <!-- Scene 1: Opening (office meeting, 0-3.2s) -->
      <div id="s1" class="scene clip" data-start="0" data-duration="3.2" data-track-index="1">
        <div class="bg-image"></div>
        <div class="center-hero">
          <div id="mono1" class="mono">V</div>
        </div>
      </div>

      <!-- Scene 2: Service 1 (laptop person, 3.0-6.5s) -->
      <div id="s2" class="scene clip" data-start="3.0" data-duration="3.5" data-track-index="2">
        <div class="bg-image"></div>
        <div class="text-wrap">
          <div id="e2" class="eyebrow">Service 01</div>
          <div id="h2" class="headline">Google 広告運用代行</div>
          <div id="sub2" class="sub">業種特化のCVR最適化 — 検索・ディスプレイ・GDN・YouTube統合運用</div>
        </div>
      </div>

      <!-- Scene 3: Service 2 (handshake, 6.3-9.5s) -->
      <div id="s3" class="scene clip" data-start="6.3" data-duration="3.2" data-track-index="3">
        <div class="bg-image"></div>
        <div class="text-wrap">
          <div id="e3" class="eyebrow">Service 02</div>
          <div id="h3" class="headline">LP 制作 ・ Web サイト構築</div>
          <div id="sub3" class="sub">成果直結のデザイン × 業界最速の実装体制</div>
        </div>
      </div>

      <!-- Scene 4: Service 3 (analytics, 9.3-12.2s) -->
      <div id="s4" class="scene clip" data-start="9.3" data-duration="2.9" data-track-index="4">
        <div class="bg-image"></div>
        <div class="text-wrap">
          <div id="e4" class="eyebrow">Proof</div>
          <div id="h4" class="headline">数字で語る成果</div>
          <div id="sub4" class="sub">GA4 × GSC × Google広告 — 3層計測で再現性のあるグロースを設計</div>
        </div>
      </div>

      <!-- Scene 5: Brand closer (city skyline, 12.0-15s) -->
      <div id="s5" class="scene clip" data-start="12.0" data-duration="3.0" data-track-index="5">
        <div class="bg-image"></div>
        <div class="center-hero">
          <div id="brand-title" class="brand-title">株式会社オフィスVONDS</div>
          <div id="brand-divider" class="brand-divider"></div>
          <div id="brand-tagline" class="brand-tagline">Google 広告運用代行 × LP 制作</div>
          <div id="brand-cta" class="brand-cta">クライアントのCV最大化を設計する</div>
        </div>
      </div>

      <!-- Cinematic overlay (持続表示) -->
      <div id="gold-top" class="gold-bar clip" data-start="0.3" data-duration="14.7" data-track-index="10"></div>
      <div id="gold-bottom" class="gold-bar clip" data-start="0.3" data-duration="14.7" data-track-index="11"></div>
      <div id="ct-tl" class="corner clip" data-start="0.6" data-duration="14.4" data-track-index="12"></div>
      <div id="ct-tr" class="corner clip" data-start="0.6" data-duration="14.4" data-track-index="13"></div>
      <div id="ct-bl" class="corner clip" data-start="0.6" data-duration="14.4" data-track-index="14"></div>
      <div id="ct-br" class="corner clip" data-start="0.6" data-duration="14.4" data-track-index="15"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ===== Overlay: gold frame & corners (持続表示) =====
      tl.to(["#gold-top", "#gold-bottom"], { opacity: 1, duration: 1.4, ease: "power3.out", stagger: 0.1 }, 0.3);
      tl.to([".corner"], { opacity: 0.7, duration: 0.8, ease: "power2.out", stagger: 0.08 }, 0.6);

      // ===== Scene 1: Opening (0-3.2s) =====
      // Fade in
      tl.to("#s1", { opacity: 1, duration: 0.8, ease: "power2.out" }, 0);
      // Ken Burns: zoom in subtle
      tl.fromTo("#s1 .bg-image", { scale: 1.0 }, { scale: 1.15, duration: 3.2, ease: "none" }, 0);
      // Mono "V" fade + scale up
      tl.fromTo("#mono1", { scale: 0.88, y: 10 }, { scale: 1, y: 0, opacity: 1, duration: 1.3, ease: "power3.out" }, 0.6);
      // Mono fade out
      tl.to("#mono1", { opacity: 0, scale: 1.08, duration: 0.8, ease: "power2.in" }, 2.4);
      // Scene 1 cross-fade out
      tl.to("#s1", { opacity: 0, duration: 0.8, ease: "power2.in" }, 2.6);

      // ===== Scene 2: Service 01 (3.0-6.5s) =====
      tl.to("#s2", { opacity: 1, duration: 0.8, ease: "power2.out" }, 3.0);
      tl.fromTo("#s2 .bg-image", { scale: 1.12, x: 30 }, { scale: 1.0, x: 0, duration: 3.5, ease: "none" }, 3.0);
      tl.fromTo("#e2", { y: 14 }, { y: 0, opacity: 1, duration: 0.7, ease: "power2.out" }, 3.6);
      tl.fromTo("#h2", { y: 22 }, { y: 0, opacity: 1, duration: 1.0, ease: "power3.out" }, 3.8);
      tl.fromTo("#sub2", { y: 14 }, { y: 0, opacity: 1, duration: 0.9, ease: "power2.out" }, 4.3);
      tl.to("#s2", { opacity: 0, duration: 0.8, ease: "power2.in" }, 5.7);

      // ===== Scene 3: Service 02 (6.3-9.5s) =====
      tl.to("#s3", { opacity: 1, duration: 0.8, ease: "power2.out" }, 6.3);
      tl.fromTo("#s3 .bg-image", { scale: 1.12, x: -30 }, { scale: 1.0, x: 0, duration: 3.2, ease: "none" }, 6.3);
      tl.fromTo("#e3", { y: 14 }, { y: 0, opacity: 1, duration: 0.7, ease: "power2.out" }, 6.9);
      tl.fromTo("#h3", { y: 22 }, { y: 0, opacity: 1, duration: 1.0, ease: "power3.out" }, 7.1);
      tl.fromTo("#sub3", { y: 14 }, { y: 0, opacity: 1, duration: 0.9, ease: "power2.out" }, 7.5);
      tl.to("#s3", { opacity: 0, duration: 0.8, ease: "power2.in" }, 8.7);

      // ===== Scene 4: Proof (9.3-12.2s) =====
      tl.to("#s4", { opacity: 1, duration: 0.8, ease: "power2.out" }, 9.3);
      tl.fromTo("#s4 .bg-image", { scale: 1.12, y: 20 }, { scale: 1.0, y: 0, duration: 2.9, ease: "none" }, 9.3);
      tl.fromTo("#e4", { y: 14 }, { y: 0, opacity: 1, duration: 0.7, ease: "power2.out" }, 9.9);
      tl.fromTo("#h4", { y: 22 }, { y: 0, opacity: 1, duration: 1.0, ease: "power3.out" }, 10.1);
      tl.fromTo("#sub4", { y: 14 }, { y: 0, opacity: 1, duration: 0.9, ease: "power2.out" }, 10.5);
      tl.to("#s4", { opacity: 0, duration: 0.8, ease: "power2.in" }, 11.4);

      // ===== Scene 5: Brand closer (12.0-15s) =====
      tl.to("#s5", { opacity: 1, duration: 0.8, ease: "power2.out" }, 12.0);
      tl.fromTo("#s5 .bg-image", { scale: 1.08 }, { scale: 1.0, duration: 3.0, ease: "none" }, 12.0);
      tl.fromTo("#brand-title", { y: 24 }, { y: 0, opacity: 1, duration: 1.1, ease: "power3.out" }, 12.4);
      tl.to("#brand-divider", { width: 520, opacity: 1, duration: 0.9, ease: "power3.out" }, 13.1);
      tl.fromTo("#brand-tagline", { y: 14 }, { y: 0, opacity: 1, duration: 1.0, ease: "power3.out" }, 13.4);
      tl.fromTo("#brand-cta", { y: 12 }, { y: 0, opacity: 1, duration: 1.0, ease: "power2.out" }, 13.9);

      // Final: overlay fade out
      tl.to(["#gold-top", "#gold-bottom", ".corner"], { opacity: 0, duration: 0.8, ease: "power2.in" }, 14.3);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
