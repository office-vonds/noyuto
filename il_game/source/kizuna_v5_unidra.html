<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
  import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

  // Firebase プロジェクト: il-game（2026-04-10 設定）
  const firebaseConfig = {
    apiKey: "AIzaSyAYjyeU-cZ5VMYnNkeNXATmIJhi-SZuY0M",
    authDomain: "il-game.firebaseapp.com",
    projectId: "il-game",
    storageBucket: "il-game.firebasestorage.app",
    messagingSenderId: "759997319728",
    appId: "1:759997319728:web:c01fe2d7f97ce4cfc7fbf5",
    measurementId: "G-PGXEH0VGJ4"
  };

  let db = null;
  try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
  } catch(e) { console.warn("Firebase init failed:", e); }

  // 匿名化関数：個人情報っぽいパターンを全部除去
  const anonymize = (text, castName) => {
    if (!text) return "";
    let s = String(text);
    // キャスト名を全削除
    if (castName) {
      const nameRe = new RegExp(castName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + 'ちゃん?|' + castName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      s = s.replace(nameRe, '[NAME]');
    }
    // 電話番号
    s = s.replace(/0\d{1,4}[-\s]?\d{1,4}[-\s]?\d{3,4}/g, '[PHONE]');
    // メールアドレス
    s = s.replace(/[\w.+-]+@[\w.-]+\.[\w.-]+/g, '[EMAIL]');
    // URL
    s = s.replace(/https?:\/\/[^\s]+/g, '[URL]');
    // 生年月日（YYYY/MM/DD, YYYY-MM-DD）
    s = s.replace(/\b(19|20)\d{2}[\/\-年]\d{1,2}[\/\-月]\d{1,2}日?\b/g, '[DATE]');
    // 金額（5桁以上・個人特定リスク低いが念のため）
    // ※ 金額はそのまま残す（傾向分析に必要）
    // 住所らしき連番（〒123-4567等）
    s = s.replace(/〒?\d{3}-?\d{4}/g, '[POSTAL]');
    return s;
  };

  // セッションハッシュ生成（cast_name + 端末固有文字列のSHA的ハッシュ・非可逆）
  const getSessionHash = async (castName) => {
    try {
      let deviceSalt = localStorage.getItem('rina_device_salt');
      if (!deviceSalt) {
        deviceSalt = Math.random().toString(36).substring(2) + Date.now().toString(36);
        localStorage.setItem('rina_device_salt', deviceSalt);
      }
      const raw = castName + '|' + deviceSalt + '|kizuna_rina_v1';
      const buf = new TextEncoder().encode(raw);
      const hash = await crypto.subtle.digest('SHA-256', buf);
      return Array.from(new Uint8Array(hash)).slice(0, 8).map(b => b.toString(16).padStart(2, '0')).join('');
    } catch(e) {
      return 'anon_' + Math.random().toString(36).substring(2, 10);
    }
  };

  // 学習ログ送信（匿名化してFirestoreへ）
  window.rinaLogChat = async ({castName, castIl, category, userMessage, rinaResponse, quickReplyUsed, unidraSuggested, consented}) => {
    if (!db) return;
    if (!consented) return; // 同意なしは送信しない
    try {
      const sessionHash = await getSessionHash(castName || 'unknown');
      await addDoc(collection(db, 'rina_chat_logs'), {
        session_hash: sessionHash,
        timestamp: serverTimestamp(),
        category: category || 'free',
        user_message: anonymize(userMessage, castName).substring(0, 1800),
        rina_response: (rinaResponse || '').substring(0, 1800),
        cast_il_bucket: castIl ? Math.floor(castIl / 10) * 10 : 0,  // 0,10,20,30... 単位に丸める（IL個別特定回避）
        quick_reply_used: !!quickReplyUsed,
        unidra_suggested: !!unidraSuggested,
        message_length: (userMessage || '').length,
        app_version: 'v5.1_rina'
      });
    } catch(e) { console.warn("Firestore log failed:", e); }
  };
</script>

// ─── Timer Tab ───────────────────────────────────────
function TimerTab({checked, cast}) {
  const [running, setRunning] = React.useState(false);
  const [seconds, setSeconds] = React.useState(0);
  const [sessions, setSessions] = React.useState([]);
  const intRef = React.useRef(null);

  React.useEffect(() => {
    if (running) {
      intRef.current = setInterval(() => setSeconds(s => s + 1), 1000);
    } else {
      clearInterval(intRef.current);
      intRef.current = null;
    }
    return () => clearInterval(intRef.current);
  }, [running]);

  const fmt = (s) => {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const mm = String(m).padStart(2, "0");
    const ss = String(sec).padStart(2, "0");
    return h > 0 ? h + ":" + mm + ":" + ss : mm + ":" + ss;
  };

  const stop = () => {
    if (seconds > 0) {
      trackEvent('timer_stop', {cast_name: cast.name, cast_il: cast.il, duration_seconds: seconds, estimated_pv: Math.floor(seconds/3600*cast.pv), missions_completed: Object.values(checked).filter(Boolean).length});
      setSessions(p => [{duration:seconds, missions:Object.values(checked).filter(Boolean).length, pv:Math.floor(seconds/3600*cast.pv), time:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})}, ...p].slice(0, 5));
    }
    setRunning(false);
    setSeconds(0);
  };

  const tips = ["今すぐミテネを5件送ろう！📱","写メ日記のタイトルを考えよう✍️","マイガールさんにオキニトークを送ろう💬","限定日記のネタを考えよう🔐","動画日記のネタを考えよう🎥","日記に使う写真を撮っておこう📸"];
  const tip = tips[Math.floor(seconds / 30) % tips.length];
  const completedMissions = Object.values(checked).filter(Boolean).length;
  const estimatedPV = Math.floor(seconds / 3600 * cast.pv);

  return (
    <div style={{padding:16}} className="fade-slide">
      <div style={{background:"linear-gradient(135deg,rgba(255,105,180,0.15),rgba(147,112,219,0.12))",border:"1px solid " + (running ? "rgba(255,105,180,0.5)" : "rgba(255,105,180,0.2)"),borderRadius:24,padding:"28px 20px",textAlign:"center",marginBottom:14}}>
        <div style={{fontSize:12,color:"rgba(255,200,230,0.6)",letterSpacing:2,marginBottom:8}}>{running ? "🔴 待機中 — この時間が未来の収入になる" : "⏸ 待機タイマー"}</div>
        <div style={{fontSize:62,fontWeight:900,letterSpacing:2,color:running ? "#FF69B4" : "rgba(255,200,230,0.5)",fontVariantNumeric:"tabular-nums"}}>{fmt(seconds)}</div>
        {running && seconds > 0 && (
          <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <div style={{background:"rgba(255,255,255,0.07)",borderRadius:12,padding:"8px 4px"}}>
              <div style={{fontSize:16,fontWeight:800,color:"#FFD700"}}>{estimatedPV}</div>
              <div style={{fontSize:9,color:"rgba(255,200,230,0.5)"}}>推定PV</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.07)",borderRadius:12,padding:"8px 4px"}}>
              <div style={{fontSize:16,fontWeight:800,color:"#4ADE80"}}>{completedMissions}</div>
              <div style={{fontSize:9,color:"rgba(255,200,230,0.5)"}}>完了ミッション</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.07)",borderRadius:12,padding:"8px 4px"}}>
              <div style={{fontSize:16,fontWeight:800,color:"#A78BFA"}}>{(estimatedPV/300).toFixed(2)}</div>
              <div style={{fontSize:9,color:"rgba(255,200,230,0.5)"}}>推定成約貢献</div>
            </div>
          </div>
        )}
        <div style={{marginTop:20,display:"flex",gap:12,justifyContent:"center"}}>
          {!running ? (
            <button className="btn-tap" onClick={() => { trackEvent('timer_start', {cast_name: cast.name, cast_il: cast.il}); setRunning(true); }}
              style={{background:"linear-gradient(90deg,#FF69B4,#A78BFA)",color:"white",padding:"16px 48px",fontSize:18,fontWeight:900,border:"none",borderRadius:999,cursor:"pointer",boxShadow:"0 4px 20px rgba(255,105,180,0.4)"}}>
              ▶ 待機スタート
            </button>
          ) : (
            <>
              <button className="btn-tap" onClick={() => setRunning(false)}
                style={{background:"rgba(255,255,255,0.1)",color:"white",padding:"14px 28px",border:"1px solid rgba(255,200,230,0.3)",borderRadius:999,fontSize:15,fontWeight:700,cursor:"pointer"}}>
                ⏸ 一時停止
              </button>
              <button className="btn-tap" onClick={stop}
                style={{background:"rgba(255,68,68,0.2)",color:"#FF6B6B",padding:"14px 28px",border:"1px solid rgba(255,68,68,0.3)",borderRadius:999,fontSize:15,fontWeight:700,cursor:"pointer"}}>
                ⏹ 終了

            </>

        </div>
      </div>
      {running && (
        <div style={{background:"rgba(255,215,0,0.1)",border:"1px solid rgba(255,215,0,0.3)",borderRadius:16,padding:"14px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:28,flexShrink:0}}>💡</div>
          <div>
            <div style={{fontSize:11,color:"rgba(255,200,230,0.55)",marginBottom:3}}>今すぐできること</div>
            <div style={{fontSize:14,fontWeight:700}}>{tip}</div>
          </div>
        </div>
      )}
      <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,200,230,0.1)",borderRadius:16,padding:"14px 16px",marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>🧠 待機中にやること = 未来の収入</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{background:"rgba(74,222,128,0.15)",border:"1px solid rgba(74,222,128,0.3)",borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
            <div style={{fontSize:26,marginBottom:4}}>💸</div>
            <div style={{fontSize:13,fontWeight:800,color:"#4ADE80"}}>接客中</div>
            <div style={{fontSize:10,color:"rgba(255,200,230,0.7)",marginTop:4,lineHeight:1.5}}>今すぐお金になる時間</div>
          </div>
          <div style={{background:"rgba(255,105,180,0.15)",border:"1px solid rgba(255,105,180,0.3)",borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
            <div style={{fontSize:26,marginBottom:4}}>📈</div>
            <div style={{fontSize:13,fontWeight:800,color:"#FF69B4"}}>待機中</div>
            <div style={{fontSize:10,color:"rgba(255,200,230,0.7)",marginTop:4,lineHeight:1.5}}>将来のお客さんを集める時間</div>
          </div>
        </div>
      </div>
      {sessions.length > 0 && (

                <span style={{color:"#FF69B4"}}>{fmt(s.duration)}</span>

function AdminPanel({casts, setCasts, onBack}) {
  const [view, setView] = useState("list");
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  const [toast, setToast] = useState("");
  const [deleteId, setDeleteId] = useState(null);
  const [importPreview, setImportPreview] = useState(null);
  const [importing, setImporting] = useState(false);
  const fileRef = useRef(null);
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2200); };

  const handleExcel = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImporting(true);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, {type:"array"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1});
        const h = rows[0].map(x => String(x));
        const fi = (keyword) => h.findIndex(x => x.includes(keyword));
        const idx = { name:fi("女の子名"), il:fi("合計pt"), pv:fi("出勤平均"), diary:fi("写メ日記"), limited:fi("限定日記"), video:fi("動画日記"), mitene:fi("ミテネ"), okini:fi("オキニトーク"), mygirl:fi("累計") };
        const parsed = rows.slice(1).filter(r => r[idx.name]).map((r, i) => ({
          id:i+1, name:String(r[idx.name]||"").trim(), il:Math.round(Number(r[idx.il])||0),
          pv:Math.round(Number(r[idx.pv])||0), diary:Math.round(Number(r[idx.diary])||0),
          limited:Math.round(Number(r[idx.limited])||0), video:Math.round(Number(r[idx.video])||0),
          mitene:Math.round(Number(r[idx.mitene])||0), okini:Math.round(Number(r[idx.okini])||0),
          mygirl:Math.round(Number(r[idx.mygirl])||0), pin:"0000"
        })).filter(c => c.name.length > 0);
        setImportPreview(parsed);
        setView("import");
      } catch(err) { showToast("❌ 読み込みエラー"); }
      setImporting(false);
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  };

  const executeImport = () => {
    // Preserve existing PINs
    const pinMap = {};
    casts.forEach(c => { pinMap[c.name.trim()] = c.pin || "0000"; });
    const merged = importPreview.map(c => ({...c, pin:pinMap[c.name] || "0000"}));
    trackEvent('excel_import', {cast_count: merged.length, avg_il: Math.round(merged.reduce((s,c) => s + c.il, 0) / merged.length)});
    setCasts(merged); saveCasts(merged);
    showToast("✅ " + merged.length + "名をインポートしました！");
    setImportPreview(null); setView("list");
  };

  const saveEdit = () => {
    if (!form.name.trim()) { showToast("❌ 名前を入力してください"); return; }
    const updated = casts.map(c => c.id === editing ? {...form, id:editing} : c);
    setCasts(updated); saveCasts(updated); showToast("✅ 保存しました！"); setView("list");
  };

  const saveAdd = () => {
    if (!form.name.trim()) { showToast("❌ 名前を入力してください"); return; }

// ─── PIN Entry ───────────────────────────────────────
function PinEntry({cast, onSuccess, onBack}) {
  const [pin, setPin] = useState("");
  const [err, setErr] = useState(false);
  const [shake, setShake] = useState(false);
  const rank = getILRank(cast.il);
  const emoji = cast.il >= 25 ? "🌟" : cast.il >= 15 ? "⭐" : cast.il >= 8 ? "🌙" : "💫";

  const handleNum = (n) => {
    if (pin.length >= 4) return;
    const next = pin + n;
    setPin(next);
    if (next.length === 4) {
      setTimeout(() => {
        const correctPin = cast.pin || "0000";
        if (next === correctPin) {
          onSuccess();
        } else {
          setShake(true);
          setErr(true);
          setTimeout(() => { setPin(""); setErr(false); setShake(false); }, 1000);
        }
      }, 200);
    }
  };

  const handleDel = () => setPin(p => p.slice(0, -1));

  const numpad = ["1","2","3","4","5","6","7","8","9","","0","⌫"];

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0a0015,#1a0030)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:44,marginBottom:8}}>{emoji}</div>
        <div style={{fontSize:22,fontWeight:900}}>{cast.name}</div>
        <div style={{fontSize:12,color:rank.color,marginTop:4}}>{rank.name} IL{cast.il}点</div>
      </div>
      <div style={{fontSize:14,color:"rgba(255,200,230,0.6)",marginBottom:20}}>🔐 4桁PINを入力してください</div>
      <div style={{display:"flex",gap:14,marginBottom:28,animation:shake ? "shake 0.4s" : "none"}}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{width:52,height:52,borderRadius:14,background:pin.length > i ? "rgba(255,105,180,0.3)" : "rgba(255,255,255,0.07)",border:pin.length > i ? "2px solid #FF69B4" : "2px solid rgba(255,200,230,0.2)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
            {pin.length > i && <div style={{width:16,height:16,borderRadius:"50%",background:"#FF69B4"}} />}
          </div>
        ))}
      </div>
      {err && <div style={{color:"#FF6B6B",fontSize:13,marginBottom:16,fontWeight:700}}>❌ PINが違います</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,width:"100%",maxWidth:280,marginBottom:20}}>
        {numpad.map((n, i) => (
          <button key={i} onClick={() => n === "⌫" ? handleDel() : n === "" ? null : handleNum(n)}
            className="btn-tap"
            style={{background:n === "" ? "transparent" : n === "⌫" ? "rgba(255,68,68,0.15)" : "rgba(255,255,255,0.08)",border:n === "" ? "none" : n === "⌫" ? "1px solid rgba(255,68,68,0.3)" : "1px solid rgba(255,200,230,0.15)",borderRadius:14,padding:"18px 0",fontSize:n === "⌫" ? 20 : 22,fontWeight:700,color:n === "⌫" ? "#FF6B6B" : "white",cursor:n === "" ? "default" : "pointer"}}>
            {n}
          </button>
        ))}
      </div>
      <button onClick={onBack} className="btn-tap" style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,200,230,0.15)",borderRadius:12,padding:"11px 28px",color:"rgba(255,200,230,0.5)",fontSize:13,cursor:"pointer"}}>
        ← 戻る
      </button>
    </div>
  );
}

};

function ChatTab({cast}) {
  const INITIAL_MSG = {role:"assistant", text:"こんばんは、" + cast.name + "ちゃん。\n\nはじめまして、りなです。同じ業界で働いてる、ちょっと先輩の女の子だと思って。\n\n安心してほしいこと一つだけ先に。\n\n話した内容はあなたのスマホの中だけに残る仕組みで、下に「会話を消す」ボタンもあるから、店の人に見られる心配はしないで大丈夫。消せばすぐ全部消えるから、安心して話してね。\n\n私もね、過去にすごく苦しかった時期がある。離婚して、実家にも頼れなくて、通帳見るのが怖くて見ないで過ごしてた時期。友達の結婚式、行きたかったのに嘘ついて欠席した。あの夜のこと、今でも覚えてる。\n\n今は少し落ち着いてきて、この先のことも自分なりに考え始めてるところ。でも今も現場に立つことあるから、今の空気もわかるつもりだよ。\n\nだから、今しんどいことがあるなら、きっと気持ちがわかると思う。\n\n家族にも友達にも恋人にも言えないこと、ここで吐き出していいよ。まとまってなくていい。まずは上のボタンから選ぶか、思いついたまま書いてみて。\n\n…いつか、どこかで会えたら嬉しいな♡\n\n（あと一つだけ。ここでの話は、もっと寄り添えるお部屋にするための学びに、こっそり名前を伏せて使わせてもらうこともあるよ。あなただと分かる情報は一切残らない形で、未来の誰かを救うヒントになるかもしれないから。嫌だったら下のトグルでOFFにしてね）"};
  const loadChatHistory = () => {
    try {
      const saved = localStorage.getItem("kizuna_chat_" + cast.name);
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return [INITIAL_MSG];
  };
  const loadConsent = () => {
    try {
      const v = localStorage.getItem("rina_log_consent");
      return v === null ? true : v === "true";  // デフォルトON
    } catch(e) { return true; }
  };
  const [messages, setMessages] = useState(loadChatHistory);
  const [logConsent, setLogConsent] = useState(loadConsent);
  useEffect(() => {
    try { localStorage.setItem("kizuna_chat_" + cast.name, JSON.stringify(messages)); } catch(e) {}
  }, [messages, cast.name]);
  useEffect(() => {
    try { localStorage.setItem("rina_log_consent", String(logConsent)); } catch(e) {}
  }, [logConsent]);
  const clearChat = () => {
    if (!window.confirm("会話の履歴を全部消すよ。消したら戻せないけど大丈夫？")) return;
    try { localStorage.removeItem("kizuna_chat_" + cast.name); } catch(e) {}
    setMessages([INITIAL_MSG]);
    setCategory(null);
    setQuickReplies([]);
    try { trackEvent('chat_history_cleared', {cast_name: cast.name}); } catch(e) {}
  };
  // 学習ログ送信（匿名化してFirestoreへ・同意ONの時のみ）
  const logToFirestore = (userMessage, rinaResponse, cat, quickReplyUsed, unidraSuggested) => {
    if (typeof window.rinaLogChat !== 'function') return;
    window.rinaLogChat({
      castName: cast.name,
      castIl: cast.il,
      category: cat || category,
      userMessage: userMessage,
      rinaResponse: rinaResponse,
      quickReplyUsed: !!quickReplyUsed,
      unidraSuggested: !!unidraSuggested,
      consented: logConsent
    });
  };
  const [input, setInput] = useState("");
  const [category, setCategory] = useState(null);
  const [showUnidra, setShowUnidra] = useState(false);
  const [quickReplies, setQuickReplies] = useState([]);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, showUnidra, quickReplies]);

  const send = (text, cat, subTopic) => {
    if (!text.trim()) return;
    const userMsg = {role:"user", text: text.trim()};
    setMessages(m => [...m, userMsg]);
    setInput("");
    setQuickReplies([]);
    try { trackEvent('chat_message_sent', {cast_name: cast.name, category: cat || category || 'free', message_length: text.length}); } catch(e) {}
    setTimeout(() => {
      const res = mockRespond(cat || category, text, subTopic);
      setMessages(m => [...m, {role:"assistant", text: res.text}]);
      if (res.quickReplies) setQuickReplies(res.quickReplies);
      if (res.suggestUnidra) setTimeout(() => setShowUnidra(true), 800);
      // Firestoreへ匿名化ログ送信（同意ONのみ）
      logToFirestore(text, res.text, cat || category, false, !!res.suggestUnidra);
    }, 650);
  };

  const handleQuickReply = (qr) => {
    try { trackEvent('chat_quick_reply', {cast_name: cast.name, category: category, label: qr.label}); } catch(e) {}
    if (qr.subTopic) {
      // subTopic指定の場合は直接mockRespond
      setMessages(m => [...m, {role:"user", text: qr.label}]);
      setQuickReplies([]);
      setTimeout(() => {
        const res = mockRespond(category, "", qr.subTopic);
        setMessages(m => [...m, {role:"assistant", text: res.text}]);
        if (res.quickReplies) setQuickReplies(res.quickReplies);
        if (res.suggestUnidra) setTimeout(() => setShowUnidra(true), 800);
        logToFirestore(qr.label, res.text, category, true, !!res.suggestUnidra);
      }, 500);
    } else if (qr.send) {
      send(qr.send);
    }
  };

  const selectCategory = (c) => {
    setCategory(c.id);
    try { trackEvent('chat_category_select', {cast_name: cast.name, category: c.id}); } catch(e) {}
    setMessages(m => [...m, {role:"user", text: c.icon + " " + c.label}]);
    setTimeout(() => {
      const greetings = {
        money:  "お金のことだね。話してくれてありがとう。\n\n…私、その話、聞きたかった。私自身がそこで一番苦しんだから。\n\nまとまってなくていいよ。思いついた順に、ぽつぽつ書いてくれれば大丈夫。何も決めなくていい。",
        people: "対人関係だね。うん、聞くよ。\n\n「何から話せばいいかわからない」でも全然大丈夫。私、昔は待機室で誰とも話せなかった時期ある。モヤモヤしてること、何でも書いて。順番いらない。",
        family: "家族のこと。一番しんどいやつだよね。\n\n私も、親のこと話そうとすると今でも喉詰まる。まとめなくていいよ。言葉にならないなら「○○のこと」だけでもいい。そこから少しずつで。",
        health: "体調のことだね。話してくれてありがとう。\n\n体のこと、書きづらいやつ多いよね。私もずっと後回しにしてた時期ある。「なんか最近しんどい」だけでもいい。書けるところから。",
      };
      setMessages(m => [...m, {role:"assistant", text: greetings[c.id] || "話したいこと、教えて。"}]);
      setQuickReplies([
        {label:"💭 まずは吐き出したい", send:"まとまってないけど、吐き出したいだけ"},
        {label:"✍️ 書き始めてみる", send:""},
      ]);
    }, 500);
  };

  return (
    <div style={{padding:"16px 16px 20px"}} className="fade-slide">
      <div style={{background:"linear-gradient(135deg,rgba(147,112,219,0.14),rgba(255,105,180,0.08))",border:"1px solid rgba(167,139,250,0.28)",borderRadius:16,padding:"14px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:48,height:48,borderRadius:"50%",background:"linear-gradient(135deg,#FF69B4,#FFD700)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0,boxShadow:"0 3px 12px rgba(255,105,180,0.35)"}}>🌸</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:800,marginBottom:2,color:"#fff"}}>りなの相談部屋</div>
          <div style={{fontSize:10,color:"rgba(255,210,230,0.6)",lineHeight:1.5}}>先輩キャスト・りなに話せる場所<br/>🔐 店の人には見られない・あなたの端末だけに保存</div>
        </div>
      </div>
      {!category && (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {CHAT_CATEGORIES.map(c => (
            <button key={c.id} onClick={() => selectCategory(c)} className="btn-tap"
              style={{background:"rgba(255,255,255,0.04)",border:"1px solid " + c.color + "55",borderRadius:12,padding:"14px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <span style={{fontSize:24}}>{c.icon}</span>
              <span style={{fontSize:12,color:c.color,fontWeight:700}}>{c.label}</span>
            </button>
          ))}
        </div>
      )}
      <div ref={scrollRef} style={{background:"rgba(0,0,0,0.25)",border:"1px solid rgba(255,200,230,0.1)",borderRadius:14,padding:12,maxHeight:380,overflowY:"auto",marginBottom:12,minHeight:240}}>
        {messages.map((m, i) => (
          <div key={i} style={{display:"flex",flexDirection:"column",alignItems: m.role === "user" ? "flex-end" : "flex-start",marginBottom:12}}>
            {m.role === "assistant" && (
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,marginLeft:4}}>
                <div style={{width:18,height:18,borderRadius:"50%",background:"linear-gradient(135deg,#FF69B4,#FFD700)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}}>🌸</div>
                <span style={{fontSize:10,color:"rgba(255,200,230,0.6)",fontWeight:700}}>りな</span>
              </div>
            )}
            <div style={{maxWidth:"82%",background: m.role === "user" ? "linear-gradient(135deg,#FF69B4,#FFD700)" : "rgba(255,255,255,0.08)",color: m.role === "user" ? "#1a0530" : "rgba(255,230,240,0.95)",padding:"10px 14px",borderRadius:14,fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap",wordBreak:"break-word",fontWeight: m.role === "user" ? 700 : 400,border: m.role === "assistant" ? "1px solid rgba(255,200,230,0.12)" : "none"}}>
              {m.text}
            </div>
          </div>
        ))}
        {quickReplies.length > 0 && (
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6,justifyContent:"flex-start"}}>
            {quickReplies.map((qr, i) => (
              <button key={i} onClick={() => handleQuickReply(qr)} className="btn-tap"
                style={{background:"rgba(255,105,180,0.14)",border:"1px solid rgba(255,105,180,0.45)",color:"#FF69B4",borderRadius:20,padding:"7px 14px",fontSize:11.5,fontWeight:700,cursor:"pointer"}}>
                {qr.label}
              </button>
            ))}
          </div>
        )}
      </div>
      <div style={{display:"flex",gap:8}}>
        <input type="text" className="ai" placeholder="話したいことを入力…"
               value={input}
               onChange={e => setInput(e.target.value)}
               onKeyDown={e => { if (e.key === "Enter") send(input); }}
               style={{flex:1}} />
        <button onClick={() => send(input)} className="btn-tap"
                style={{background:"linear-gradient(135deg,#FF69B4,#FFD700)",color:"#1a0530",border:"none",borderRadius:10,padding:"10px 18px",fontWeight:800,fontSize:14,cursor:"pointer"}}>送信</button>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,gap:8}}>
        {category ? (
          <button onClick={() => { setCategory(null); setQuickReplies([]); }} style={{background:"none",border:"none",color:"rgba(255,200,230,0.45)",fontSize:11,cursor:"pointer",textDecoration:"underline",padding:0}}>カテゴリを選び直す</button>
        ) : <div />}
        <button onClick={clearChat} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,200,230,0.2)",color:"rgba(255,200,230,0.55)",fontSize:10.5,cursor:"pointer",padding:"6px 12px",borderRadius:14,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
          🗑 会話を消す
        </button>
      </div>
      <div style={{marginTop:14,padding:"10px 14px",background:"rgba(255,105,180,0.04)",borderRadius:12,textAlign:"center"}}>
        <div style={{fontSize:11,color:"rgba(255,210,230,0.55)",lineHeight:1.7,fontStyle:"italic"}}>いつか、どこかで会えるといいね♡</div>
      </div>
      <div style={{marginTop:10,padding:"8px 12px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,200,230,0.08)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
        <div style={{fontSize:9.5,color:"rgba(255,200,230,0.5)",lineHeight:1.55,flex:1}}>
          🔒 会話を匿名化して未来の改善に使う
          <div style={{fontSize:8.5,color:"rgba(255,200,230,0.3)",marginTop:2}}>※名前・個人情報は残らない形で</div>
        </div>
        <button onClick={() => setLogConsent(c => !c)}
          style={{background: logConsent ? "linear-gradient(135deg,#FF69B4,#FFD700)" : "rgba(255,255,255,0.08)",border:"none",borderRadius:20,padding:"4px 12px",fontSize:10,fontWeight:700,color: logConsent ? "#1a0530" : "rgba(255,200,230,0.5)",cursor:"pointer",minWidth:52}}>
          {logConsent ? "ON" : "OFF"}
        </button>
      </div>
      <div style={{fontSize:9,color:"rgba(255,200,230,0.3)",marginTop:10,textAlign:"center",lineHeight:1.6}}>
        ⚠️ 深刻なお悩みは専門機関へ：よりそいホットライン 0120-279-338（24時間・無料）
      </div>
      {showUnidra && <UnidraSuggestionModal cast={cast} onClose={() => setShowUnidra(false)} onOpenLink={() => setShowUnidra(false)} />}
    </div>
  );
}

// ─── Main App ───────────────────────────────────────
function App() {
  const [casts, setCasts] = useState(loadCasts);
  const [screen, setScreen] = useState("select");
  const [cast, setCast] = useState(null);
  const [tab, setTab] = useState("home");
  const [checked, setChecked] = useState({});
  const [weekChecked, setWeekChecked] = useState({});
  const [particles, setParticles] = useState([]);

  const spawnParticles = () => {
    const colors = ["#FF69B4","#FFD700","#00CED1","#A78BFA","#4ADE80"];
    const ps = Array.from({length:8}, (_, i) => ({id:Date.now()+i, x:10+Math.random()*80, color:colors[Math.floor(Math.random()*colors.length)]}));
    setParticles(ps);
    setTimeout(() => setParticles([]), 1100);
  };

  if (screen === "adminLogin") return <AdminLogin onLogin={() => setScreen("admin")} onBack={() => setScreen("select")} />;
  if (screen === "admin")      return <AdminPanel casts={casts} setCasts={setCasts} onBack={() => setScreen("select")} />;
  if (screen === "pubranking") return <PublicRanking casts={casts} onBack={() => setScreen("select")} />;
  if (screen === "pin" && cast) return <PinEntry cast={cast} onSuccess={() => { trackEvent('app_login', {cast_name: cast.name, cast_il: cast.il, cast_pv: cast.pv}); setTab("home"); setScreen("game"); }} onBack={() => { setCast(null); setScreen("select"); }} />;
  if (screen === "select")     return <CastSelect casts={casts} onSelect={c => { trackEvent('cast_select', {cast_name: c.name, cast_il: c.il}); setCast(c); setScreen("pin"); }} onAdminClick={() => setScreen("adminLogin")} onRankingClick={() => setScreen("pubranking")} />;

  if (!cast) { setScreen("select"); return null; }
  const rank = getILRank(cast.il);
  const tabs = [
    {id:"home",    icon:"🏠", label:"ホーム"},
    {id:"mission", icon:"🎯", label:"ミッション"},
    {id:"timer",   icon:"⏱",  label:"待機"},
    {id:"learn",   icon:"📖", label:"まなび"},
    {id:"ranking", icon:"🏆", label:"ランキング"},
    {id:"chat",    icon:"🤍", label:"相談"},
  ];

  return (
    <div style={{background:"linear-gradient(160deg,#0a0015,#1a0030,#0d0020)",minHeight:"100vh",paddingBottom:88}}>
      {particles.map(p => <Particle key={p.id} x={p.x} color={p.color} />)}
      <div style={{background:"rgba(10,0,21,0.85)",borderBottom:"1px solid rgba(255,100,200,0.18)",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,backdropFilter:"blur(12px)"}}>
        <button onClick={() => { trackEvent('app_logout', {cast_name: cast.name, cast_il: cast.il}); setCast(null); setChecked({}); setWeekChecked({}); setScreen("select"); }} style={{background:"none",border:"none",color:"rgba(255,180,220,0.5)",fontSize:22,cursor:"pointer",padding:"4px 8px 4px 0"}}>←</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:17,fontWeight:800}}>{cast.name}</div>
          <div style={{fontSize:11,color:rank.color,fontWeight:600}}>{rank.name} IL{cast.il}点</div>
        </div>
        <div style={{fontSize:24}}>{cast.il >= 25 ? "🌟" : cast.il >= 15 ? "⭐" : "💫"}</div>
      </div>
      <div style={{overflowY:"auto",maxHeight:"calc(100vh - 140px)"}}>
        {tab === "home"    && <HomeTab cast={cast} rank={rank} />}
        {tab === "mission" && <MissionTab checked={checked} setChecked={setChecked} weekChecked={weekChecked} setWeekChecked={setWeekChecked} onCheck={spawnParticles} />}
        {tab === "timer"   && <TimerTab checked={checked} cast={cast} />}
        {tab === "learn"   && <LearnTab />}
        {tab === "ranking" && <RankingTab casts={casts} myName={cast.name} />}
        {tab === "tips"    && <TipsTab />}
        {tab === "chat"    && <ChatTab cast={cast} />}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(8,0,18,0.96)",borderTop:"1px solid rgba(255,100,200,0.18)",display:"flex",backdropFilter:"blur(12px)",zIndex:50}}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => { trackEvent('tab_switch', {tab_name: t.id, cast_name: cast.name, cast_il: cast.il}); setTab(t.id); }} className="btn-tap"
            style={{flex:1,background:"none",border:"none",padding:"8px 2px 14px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
            {tab === t.id && <div style={{position:"absolute",top:0,left:"15%",right:"15%",height:2,background:"linear-gradient(90deg,#FF69B4,#FFD700)",borderRadius:2}} />}
            <span style={{fontSize:19}}>{t.icon}</span>
            <span style={{fontSize:9,color:tab === t.id ? "#FF69B4" : "rgba(255,180,220,0.35)",fontWeight:tab === t.id ? 700 : 400}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
