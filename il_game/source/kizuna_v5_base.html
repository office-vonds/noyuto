// ─── Simulator ───────────────────────────────────────
function IncomeSimulator({cast}) {
  const [targetIL, setTargetIL] = useState(Math.min(cast.il + 20, 90));
  const [days, setDays] = useState(15);
  const [price, setPrice] = useState(25000);
  const simTimer = useRef(null);
  const trackSim = (til, d, p) => {
    clearTimeout(simTimer.current);
    simTimer.current = setTimeout(() => {
      trackEvent('simulator_use', {cast_name: cast.name, current_il: cast.il, target_il: til, days: d, price: p, current_income: Math.floor(ilToBookings(cast.il) * d * p), target_income: Math.floor(ilToBookings(til) * d * p)});
    }, 800);
  };
  const rank = getILRank(cast.il);
  const targetRank = getILRank(targetIL);
  const curIncome = Math.floor(ilToBookings(cast.il) * days * price);
  const tgtIncome = Math.floor(ilToBookings(targetIL) * days * price);
  const diff = tgtIncome - curIncome;
  return (
    <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,200,230,0.12)",borderRadius:20,padding:18,marginBottom:14}}>
      <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>💴 月収シミュレーター</div>
      <div style={{fontSize:11,color:"rgba(255,200,230,0.5)",marginBottom:14}}>ILが上がると月収はどう変わる？</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center",marginBottom:14}}>
        <div style={{background:"rgba(255,255,255,0.05)",borderRadius:14,padding:"10px 8px",textAlign:"center"}}>
          <div style={{fontSize:10,color:"rgba(255,200,230,0.5)",marginBottom:2}}>現在IL</div>
          <div style={{fontSize:26,fontWeight:900,color:rank.color}}>{cast.il}</div>
          <div style={{fontSize:12,fontWeight:700,color:"white",marginTop:6}}>{curIncome.toLocaleString()}円</div>
        </div>
        <div style={{color:"rgba(255,200,230,0.4)",fontSize:20}}>→</div>
        <div style={{background:"linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,105,180,0.1))",border:"1px solid rgba(255,215,0,0.3)",borderRadius:14,padding:"10px 8px",textAlign:"center"}}>
          <div style={{fontSize:10,color:"rgba(255,200,230,0.5)",marginBottom:2}}>目標IL</div>
          <div style={{fontSize:26,fontWeight:900,color:targetRank.color}}>{targetIL}</div>
          <div style={{fontSize:12,fontWeight:700,color:"#FFD700",marginTop:6}}>{tgtIncome.toLocaleString()}円</div>
        </div>
      </div>
      <div style={{background:"rgba(74,222,128,0.12)",border:"1px solid rgba(74,222,128,0.3)",borderRadius:12,padding:"10px",textAlign:"center",marginBottom:12}}>
        <div style={{fontSize:11,color:"rgba(255,200,230,0.6)"}}>ILを{targetIL - cast.il}点上げると</div>
        <div style={{fontSize:24,fontWeight:900,color:"#4ADE80"}}>+{diff.toLocaleString()}円/月</div>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:"rgba(255,200,230,0.55)",marginBottom:4}}>目標IL: {targetIL}点</div>
        <input type="range" min={cast.il + 1} max={90} value={targetIL} onChange={e => { const v = Number(e.target.value); setTargetIL(v); trackSim(v, days, price); }} />
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div>
          <div style={{fontSize:11,color:"rgba(255,200,230,0.55)",marginBottom:4}}>月の出勤日数</div>
          <input type="number" className="ni" value={days} min={1} max={30} onChange={e => { const v = Number(e.target.value) || 15; setDays(v); trackSim(targetIL, v, price); }} />
        </div>
        <div>
          <div style={{fontSize:11,color:"rgba(255,200,230,0.55)",marginBottom:4}}>1本あたりの単価</div>
          <input type="number" className="ni" value={price} min={1000} step={1000} onChange={e => { const v = Number(e.target.value) || 25000; setPrice(v); trackSim(targetIL, days, v); }} />
        </div>
      </div>
    </div>
  );
}

            <div style={{width:90,height:8,background:"rgba(255,255,255,0.1)",borderRadius:4,marginTop:8,overflow:"hidden"}}>
              <div style={{width:((cast.il % 10) / 10 * 100) + "%",height:"100%",background:"linear-gradient(90deg," + rank.color + ",#FF69B4)",borderRadius:4}} />
            </div>
          </div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {stats.map(s => (
          <div key={s.label} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,200,230,0.1)",borderRadius:14,padding:"11px 8px",textAlign:"center"}}>

// ─── Mission Tab ───────────────────────────────────────
function MissionTab({checked, setChecked, weekChecked, setWeekChecked, onCheck}) {
  const dailyPts = dailyMissions.reduce((s, m) => s + (checked[m.id] ? m.pts : 0), 0);
  const weekPts  = weeklyMissions.reduce((s, m) => s + (weekChecked[m.id] ? m.pts : 0), 0);
  const done = Object.values(checked).filter(Boolean).length;
  return (
    <div style={{padding:16}} className="fade-slide">

          <div style={{fontSize:32,fontWeight:900,color:"#FFD700"}}>+{dailyPts + weekPts}<span style={{fontSize:14,marginLeft:2}}>pt ⭐</span></div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:"rgba(255,200,230,0.6)"}}>完了</div>
          <div style={{fontSize:26,fontWeight:900}}>{done}<span style={{fontSize:12}}>/{dailyMissions.length}</span></div>
        </div>
      </div>
      <div style={{fontSize:13,fontWeight:700,color:"rgba(255,180,220,0.7)",marginBottom:10}}>📋 デイリーミッション</div>

// ─── Timer Tab ───────────────────────────────────────
function TimerTab({checked, cast}) {
  const [running, setRunning] = React.useState(false);
  const [seconds, setSeconds] = React.useState(0);
  const [sessions, setSessions] = React.useState([]);
  const intRef = React.useRef(null);

  React.useEffect(() => {
    if (running) {
      intRef.current = setInterval(() => setSeconds(s => s + 1), 1000);
    } else {
      clearInterval(intRef.current);
      intRef.current = null;
    }
    return () => clearInterval(intRef.current);
  }, [running]);

  const fmt = (s) => {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const mm = String(m).padStart(2, "0");
    const ss = String(sec).padStart(2, "0");
    return h > 0 ? h + ":" + mm + ":" + ss : mm + ":" + ss;
  };

  const stop = () => {
    if (seconds > 0) {
      trackEvent('timer_stop', {cast_name: cast.name, cast_il: cast.il, duration_seconds: seconds, estimated_pv: Math.floor(seconds/3600*cast.pv), missions_completed: Object.values(checked).filter(Boolean).length});
      setSessions(p => [{duration:seconds, missions:Object.values(checked).filter(Boolean).length, pv:Math.floor(seconds/3600*cast.pv), time:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})}, ...p].slice(0, 5));
    }
    setRunning(false);
    setSeconds(0);
  };

  const tips = ["今すぐミテネを5件送ろう！📱","写メ日記のタイトルを考えよう✍️","マイガールさんにオキニトークを送ろう💬","限定日記のネタを考えよう🔐","動画日記のネタを考えよう🎥","日記に使う写真を撮っておこう📸"];
  const tip = tips[Math.floor(seconds / 30) % tips.length];
  const completedMissions = Object.values(checked).filter(Boolean).length;
  const estimatedPV = Math.floor(seconds / 3600 * cast.pv);

  return (
    <div style={{padding:16}} className="fade-slide">
      <div style={{background:"linear-gradient(135deg,rgba(255,105,180,0.15),rgba(147,112,219,0.12))",border:"1px solid " + (running ? "rgba(255,105,180,0.5)" : "rgba(255,105,180,0.2)"),borderRadius:24,padding:"28px 20px",textAlign:"center",marginBottom:14}}>
        <div style={{fontSize:12,color:"rgba(255,200,230,0.6)",letterSpacing:2,marginBottom:8}}>{running ? "🔴 待機中 — この時間が未来の収入になる" : "⏸ 待機タイマー"}</div>
        <div style={{fontSize:62,fontWeight:900,letterSpacing:2,color:running ? "#FF69B4" : "rgba(255,200,230,0.5)",fontVariantNumeric:"tabular-nums"}}>{fmt(seconds)}</div>
        {running && seconds > 0 && (
          <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <div style={{background:"rgba(255,255,255,0.07)",borderRadius:12,padding:"8px 4px"}}>
              <div style={{fontSize:16,fontWeight:800,color:"#FFD700"}}>{estimatedPV}</div>
              <div style={{fontSize:9,color:"rgba(255,200,230,0.5)"}}>推定PV</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.07)",borderRadius:12,padding:"8px 4px"}}>
              <div style={{fontSize:16,fontWeight:800,color:"#4ADE80"}}>{completedMissions}</div>
              <div style={{fontSize:9,color:"rgba(255,200,230,0.5)"}}>完了ミッション</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.07)",borderRadius:12,padding:"8px 4px"}}>
              <div style={{fontSize:16,fontWeight:800,color:"#A78BFA"}}>{(estimatedPV/300).toFixed(2)}</div>
              <div style={{fontSize:9,color:"rgba(255,200,230,0.5)"}}>推定成約貢献</div>
            </div>
          </div>
        )}
        <div style={{marginTop:20,display:"flex",gap:12,justifyContent:"center"}}>
          {!running ? (
            <button className="btn-tap" onClick={() => { trackEvent('timer_start', {cast_name: cast.name, cast_il: cast.il}); setRunning(true); }}
              style={{background:"linear-gradient(90deg,#FF69B4,#A78BFA)",color:"white",padding:"16px 48px",fontSize:18,fontWeight:900,border:"none",borderRadius:999,cursor:"pointer",boxShadow:"0 4px 20px rgba(255,105,180,0.4)"}}>
              ▶ 待機スタート
            </button>
          ) : (
            <>
              <button className="btn-tap" onClick={() => setRunning(false)}
                style={{background:"rgba(255,255,255,0.1)",color:"white",padding:"14px 28px",border:"1px solid rgba(255,200,230,0.3)",borderRadius:999,fontSize:15,fontWeight:700,cursor:"pointer"}}>
                ⏸ 一時停止
              </button>
              <button className="btn-tap" onClick={stop}
                style={{background:"rgba(255,68,68,0.2)",color:"#FF6B6B",padding:"14px 28px",border:"1px solid rgba(255,68,68,0.3)",borderRadius:999,fontSize:15,fontWeight:700,cursor:"pointer"}}>
                ⏹ 終了
              </button>
            </>
          )}
        </div>
      </div>
      {running && (
        <div style={{background:"rgba(255,215,0,0.1)",border:"1px solid rgba(255,215,0,0.3)",borderRadius:16,padding:"14px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:28,flexShrink:0}}>💡</div>
          <div>
            <div style={{fontSize:11,color:"rgba(255,200,230,0.55)",marginBottom:3}}>今すぐできること</div>
            <div style={{fontSize:14,fontWeight:700}}>{tip}</div>
          </div>
        </div>
      )}
      <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,200,230,0.1)",borderRadius:16,padding:"14px 16px",marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>🧠 待機中にやること = 未来の収入</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{background:"rgba(74,222,128,0.15)",border:"1px solid rgba(74,222,128,0.3)",borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
            <div style={{fontSize:26,marginBottom:4}}>💸</div>
            <div style={{fontSize:13,fontWeight:800,color:"#4ADE80"}}>接客中</div>
            <div style={{fontSize:10,color:"rgba(255,200,230,0.7)",marginTop:4,lineHeight:1.5}}>今すぐお金になる時間</div>
          </div>
          <div style={{background:"rgba(255,105,180,0.15)",border:"1px solid rgba(255,105,180,0.3)",borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
            <div style={{fontSize:26,marginBottom:4}}>📈</div>
            <div style={{fontSize:13,fontWeight:800,color:"#FF69B4"}}>待機中</div>
            <div style={{fontSize:10,color:"rgba(255,200,230,0.7)",marginTop:4,lineHeight:1.5}}>将来のお客さんを集める時間</div>
          </div>
        </div>
      </div>
      {sessions.length > 0 && (
        <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,200,230,0.1)",borderRadius:16,padding:"14px 16px"}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>📋 今日の待機履歴</div>
          {sessions.map((s, i) => (
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i < sessions.length - 1 ? "1px solid rgba(255,200,230,0.08)" : "none"}}>
              <div style={{fontSize:12,color:"rgba(255,200,230,0.7)"}}>{s.time} 終了</div>
              <div style={{display:"flex",gap:12,fontSize:12}}>
                <span style={{color:"#FF69B4"}}>{fmt(s.duration)}</span>
                <span style={{color:"#FFD700"}}>PV+{s.pv}</span>
                <span style={{color:"#4ADE80"}}>✓{s.missions}</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AdminPanel({casts, setCasts, onBack}) {
  const [view, setView] = useState("list");
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  const [toast, setToast] = useState("");
  const [deleteId, setDeleteId] = useState(null);
  const [importPreview, setImportPreview] = useState(null);
  const [importing, setImporting] = useState(false);
  const fileRef = useRef(null);
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2200); };

  const handleExcel = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImporting(true);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, {type:"array"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1});
        const h = rows[0].map(x => String(x));
        const fi = (keyword) => h.findIndex(x => x.includes(keyword));
        const idx = { name:fi("女の子名"), il:fi("合計pt"), pv:fi("出勤平均"), diary:fi("写メ日記"), limited:fi("限定日記"), video:fi("動画日記"), mitene:fi("ミテネ"), okini:fi("オキニトーク"), mygirl:fi("累計") };
        const parsed = rows.slice(1).filter(r => r[idx.name]).map((r, i) => ({
          id:i+1, name:String(r[idx.name]||"").trim(), il:Math.round(Number(r[idx.il])||0),
          pv:Math.round(Number(r[idx.pv])||0), diary:Math.round(Number(r[idx.diary])||0),
          limited:Math.round(Number(r[idx.limited])||0), video:Math.round(Number(r[idx.video])||0),
          mitene:Math.round(Number(r[idx.mitene])||0), okini:Math.round(Number(r[idx.okini])||0),
          mygirl:Math.round(Number(r[idx.mygirl])||0), pin:"0000"
        })).filter(c => c.name.length > 0);
        setImportPreview(parsed);
        setView("import");
      } catch(err) { showToast("❌ 読み込みエラー"); }
      setImporting(false);
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  };

  const executeImport = () => {
    // Preserve existing PINs
    const pinMap = {};
    casts.forEach(c => { pinMap[c.name.trim()] = c.pin || "0000"; });
    const merged = importPreview.map(c => ({...c, pin:pinMap[c.name] || "0000"}));
    trackEvent('excel_import', {cast_count: merged.length, avg_il: Math.round(merged.reduce((s,c) => s + c.il, 0) / merged.length)});
    setCasts(merged); saveCasts(merged);
    showToast("✅ " + merged.length + "名をインポートしました！");
    setImportPreview(null); setView("list");
  };

  const saveEdit = () => {
    if (!form.name.trim()) { showToast("❌ 名前を入力してください"); return; }
    const updated = casts.map(c => c.id === editing ? {...form, id:editing} : c);
    setCasts(updated); saveCasts(updated); showToast("✅ 保存しました！"); setView("list");
  };

  const saveAdd = () => {
    if (!form.name.trim()) { showToast("❌ 名前を入力してください"); return; }
    const newId = Math.max(...casts.map(c => c.id), 0) + 1;
    const c = {...form, id:newId, il:Number(form.il)||0, pv:Number(form.pv)||0, diary:Number(form.diary)||0, limited:Number(form.limited)||0, video:Number(form.video)||0, mitene:Number(form.mitene)||0, okini:Number(form.okini)||0, mygirl:Number(form.mygirl)||0, pin:form.pin||"0000"};
    const updated = [...casts, c]; setCasts(updated); saveCasts(updated); showToast("✅ 追加しました！"); setView("list");
  };

  const doDelete = () => {
    const target = casts.find(c => c.id === deleteId);
    const updated = casts.filter(c => c.id !== deleteId);
    setCasts(updated); saveCasts(updated); setDeleteId(null);
    showToast("🗑️ " + (target ? target.name : "") + " を削除しました");
  };

  const sorted = [...casts].sort((a, b) => b.il - a.il);
  const fields = [
    {key:"name",    label:"名前",         type:"text"},
    {key:"pin",     label:"🔐 PIN（4桁）", type:"text"},
    {key:"il",      label:"IL点数",        type:"number"},
    {key:"pv",      label:"出勤日PV平均",  type:"number"},
    {key:"diary",   label:"写メ日記数",    type:"number"},
    {key:"limited", label:"限定日記数",    type:"number"},
    {key:"video",   label:"動画日記数",    type:"number"},
    {key:"mitene",  label:"ミテネ回数",    type:"number"},
    {key:"okini",   label:"オキニ送信",    type:"number"},
    {key:"mygirl",  label:"マイガール数",  type:"number"},
  ];

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0a0015,#1a0030,#0d0020)",paddingBottom:40}}>
      {toast && <div className="copy-toast">{toast}</div>}
      {deleteId && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#1a0030",border:"1px solid rgba(255,100,200,0.3)",borderRadius:20,padding:28,width:"100%",maxWidth:320,textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
            <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>{(casts.find(c => c.id === deleteId) || {}).name} を削除しますか？</div>
            <div style={{fontSize:12,color:"rgba(255,200,230,0.55)",marginBottom:24}}>この操作は元に戻せません</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={() => setDeleteId(null)} className="btn-tap" style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,200,230,0.2)",borderRadius:12,padding:12,color:"white",cursor:"pointer",fontSize:14}}>キャンセル</button>
              <button onClick={doDelete} className="btn-tap" style={{flex:1,background:"#FF4444",border:"none",borderRadius:12,padding:12,color:"white",cursor:"pointer",fontWeight:800,fontSize:14}}>削除する</button>
            </div>
          </div>
        </div>
      )}
      <div style={{background:"rgba(10,0,21,0.9)",borderBottom:"1px solid rgba(255,100,200,0.2)",padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,backdropFilter:"blur(12px)"}}>
        <button onClick={view === "list" ? onBack : () => setView("list")} style={{background:"none",border:"none",color:"rgba(255,180,220,0.6)",fontSize:22,cursor:"pointer"}}>←</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:16,fontWeight:800}}>{view === "list" ? "⚙️ 管理者パネル" : view === "edit" ? "✏️ 編集" : view === "add" ? "➕ 追加" : "📥 インポート確認"}</div>
          {view === "list" && <div style={{fontSize:10,color:"rgba(255,200,230,0.45)",marginTop:2}}>全 {casts.length} 名</div>}
        </div>
        {view === "list"
          ? <button onClick={() => { setForm({name:"",pin:"0000",il:0,pv:0,diary:0,limited:0,video:0,mitene:0,okini:0,mygirl:0}); setView("add"); }} className="btn-tap" style={{background:"linear-gradient(90deg,#FF69B4,#A78BFA)",border:"none",borderRadius:10,padding:"8px 14px",color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>+ 追加</button>
          : <div style={{width:60}} />
        }
      </div>

      {view === "list" && (
        <div style={{padding:16}} className="fade-slide">
          <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleExcel} />
          <button onClick={() => fileRef.current && fileRef.current.click()} className="btn-tap"

            <span style={{fontSize:22}}>📥</span>

              <div style={{fontSize:14,fontWeight:800,color:"#4ADE80"}}>エクセルをインポート</div>

          <div style={{background:"rgba(255,215,0,0.08)",border:"1px solid rgba(255,215,0,0.2)",borderRadius:14,padding:"12px 16px",marginBottom:14,fontSize:12,color:"rgba(255,220,180,0.8)",lineHeight:1.7}}>
            💡 毎月データが出たら更新しよう。PINは自動で引き継がれます。✏️で編集、🗑️で削除。

              </div>

        <div style={{padding:16}} className="fade-slide">
          <div style={{background:"rgba(74,222,128,0.1)",border:"1px solid rgba(74,222,128,0.3)",borderRadius:16,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:15,fontWeight:800,color:"#4ADE80",marginBottom:4}}>📥 インポートプレビュー</div>
            <div style={{fontSize:13,color:"white",fontWeight:700}}>{importPreview.length}名のデータを検出（PINは自動引き継ぎ）</div>
          </div>
          <div style={{maxHeight:320,overflowY:"auto",marginBottom:14}}>
            {importPreview.map((c, i) => {
              const r = getILRank(c.il);
              return (
                <div key={i} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,200,230,0.08)",borderRadius:12,padding:"10px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <span style={{fontSize:14,fontWeight:700}}>{c.name}</span>
                    <span style={{fontSize:11,color:r.color,marginLeft:8}}>IL {c.il}点</span>
                  </div>
                  <div style={{fontSize:10,color:"rgba(255,200,230,0.45)"}}>PV{c.pv} 日記{c.diary}</div>
                </div>
              );
            })}
          </div>
          <div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.25)",borderRadius:12,padding:"10px 14px",marginBottom:14,fontSize:12,color:"rgba(255,180,180,0.8)"}}>
            ⚠️ 実行すると現在のデータがすべて上書きされます
          </div>
          <button onClick={executeImport} className="btn-tap" style={{width:"100%",background:"linear-gradient(90deg,#4ADE80,#22C55E)",border:"none",borderRadius:14,padding:"16px",fontSize:16,fontWeight:800,color:"#000",cursor:"pointer",marginBottom:10}}>
            ✅ インポート実行
          </button>
          <button onClick={() => { setImportPreview(null); setView("list"); }} className="btn-tap" style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,200,230,0.2)",borderRadius:14,padding:"13px",fontSize:13,color:"rgba(255,200,230,0.6)",cursor:"pointer"}}>キャンセル</button>
        </div>
      )}

      {(view === "edit" || view === "add") && (
        <div style={{padding:16}} className="fade-slide">
          <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,200,230,0.12)",borderRadius:18,padding:18,marginBottom:16}}>
            {fields.map(f => (
              <div key={f.key} style={{marginBottom:14}}>
                <div style={{fontSize:12,color:"rgba(255,200,230,0.65)",marginBottom:5,fontWeight:600}}>{f.label}</div>
                {f.type === "text"
                  ? <input className="ai" type="text" value={form[f.key] || ""} onChange={e => setForm(p => ({...p, [f.key]:e.target.value}))} placeholder={f.label + "を入力"} />
                  : <input className="ni" type="number" inputMode="numeric" value={form[f.key] || 0} min="0" onChange={e => setForm(p => ({...p, [f.key]:Number(e.target.value)}))} />
                }
              </div>
            ))}
          </div>
          <button onClick={view === "edit" ? saveEdit : saveAdd} className="btn-tap" style={{width:"100%",background:"linear-gradient(90deg,#FF69B4,#A78BFA)",border:"none",borderRadius:14,padding:"16px",fontSize:16,fontWeight:800,color:"white",cursor:"pointer",marginBottom:10}}>
            {view === "edit" ? "💾 保存する" : "➕ 追加する"}
          </button>
          <button onClick={() => setView("list")} className="btn-tap" style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,200,230,0.2)",borderRadius:14,padding:"13px",fontSize:13,color:"rgba(255,200,230,0.6)",cursor:"pointer"}}>キャンセル</button>
        </div>
      )}
    </div>
  );
}

// ─── PIN Entry ───────────────────────────────────────
function PinEntry({cast, onSuccess, onBack}) {
  const [pin, setPin] = useState("");
  const [err, setErr] = useState(false);
  const [shake, setShake] = useState(false);
  const rank = getILRank(cast.il);
  const emoji = cast.il >= 25 ? "🌟" : cast.il >= 15 ? "⭐" : cast.il >= 8 ? "🌙" : "💫";

  const handleNum = (n) => {
    if (pin.length >= 4) return;
    const next = pin + n;
    setPin(next);
    if (next.length === 4) {
      setTimeout(() => {
        const correctPin = cast.pin || "0000";
        if (next === correctPin) {
          onSuccess();
        } else {
          setShake(true);
          setErr(true);
          setTimeout(() => { setPin(""); setErr(false); setShake(false); }, 1000);
        }
      }, 200);
    }
  };

  const handleDel = () => setPin(p => p.slice(0, -1));

  const numpad = ["1","2","3","4","5","6","7","8","9","","0","⌫"];

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0a0015,#1a0030)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:44,marginBottom:8}}>{emoji}</div>
        <div style={{fontSize:22,fontWeight:900}}>{cast.name}</div>
        <div style={{fontSize:12,color:rank.color,marginTop:4}}>{rank.name} IL{cast.il}点</div>
      </div>
      <div style={{fontSize:14,color:"rgba(255,200,230,0.6)",marginBottom:20}}>🔐 4桁PINを入力してください</div>
      <div style={{display:"flex",gap:14,marginBottom:28,animation:shake ? "shake 0.4s" : "none"}}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{width:52,height:52,borderRadius:14,background:pin.length > i ? "rgba(255,105,180,0.3)" : "rgba(255,255,255,0.07)",border:pin.length > i ? "2px solid #FF69B4" : "2px solid rgba(255,200,230,0.2)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
            {pin.length > i && <div style={{width:16,height:16,borderRadius:"50%",background:"#FF69B4"}} />}
          </div>
        ))}
      </div>
      {err && <div style={{color:"#FF6B6B",fontSize:13,marginBottom:16,fontWeight:700}}>❌ PINが違います</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,width:"100%",maxWidth:280,marginBottom:20}}>
        {numpad.map((n, i) => (
          <button key={i} onClick={() => n === "⌫" ? handleDel() : n === "" ? null : handleNum(n)}
            className="btn-tap"
            style={{background:n === "" ? "transparent" : n === "⌫" ? "rgba(255,68,68,0.15)" : "rgba(255,255,255,0.08)",border:n === "" ? "none" : n === "⌫" ? "1px solid rgba(255,68,68,0.3)" : "1px solid rgba(255,200,230,0.15)",borderRadius:14,padding:"18px 0",fontSize:n === "⌫" ? 20 : 22,fontWeight:700,color:n === "⌫" ? "#FF6B6B" : "white",cursor:n === "" ? "default" : "pointer"}}>
            {n}
          </button>
        ))}
      </div>
      <button onClick={onBack} className="btn-tap" style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,200,230,0.15)",borderRadius:12,padding:"11px 28px",color:"rgba(255,200,230,0.5)",fontSize:13,cursor:"pointer"}}>
        ← 戻る
      </button>
    </div>
  );
}

// ─── Cast Select ───────────────────────────────────────
function CastSelect({casts, onSelect, onAdminClick, onRankingClick}) {
  const [search, setSearch] = useState("");
  const sorted = [...casts].sort((a, b) => b.il - a.il);
  const filtered = search.trim()
    ? sorted.filter(c => c.name.includes(search.trim()))
    : sorted;
  return (
    <div style={{background:"linear-gradient(160deg,#0a0015,#1a0030,#0d0020)",minHeight:"100vh",paddingBottom:40}}>
      <div style={{padding:"32px 20px 20px",textAlign:"center",borderBottom:"1px solid rgba(255,100,200,0.15)"}}>
        <div style={{fontSize:28,fontWeight:900,letterSpacing:3,background:"linear-gradient(90deg,#FF69B4,#FFD700,#FF69B4)",backgroundSize:"200%",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"shimmer 3s linear infinite"}}>✨ 絆 IL チャレンジ ✨</div>
        <div style={{fontSize:12,color:"rgba(255,180,220,0.65)",marginTop:6}}>インフルエンサーレベル向上ゲーム</div>
      </div>
      <div style={{padding:"18px 16px"}}>
        <button onClick={onRankingClick} className="btn-tap"
          style={{width:"100%",background:"linear-gradient(90deg,rgba(255,215,0,0.15),rgba(255,105,180,0.1))",border:"1px solid rgba(255,215,0,0.3)",borderRadius:16,padding:"14px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:10,cursor:"pointer"}}>
          <span style={{fontSize:22}}>🏆</span>
          <div style={{textAlign:"left"}}>
            <div style={{fontSize:14,fontWeight:800,color:"#FFD700"}}>みんなのランキングを見る</div>
            <div style={{fontSize:10,color:"rgba(255,200,230,0.55)"}}>PIN不要・誰でも見られます</div>
          </div>
        </button>
        <div style={{fontSize:13,color:"rgba(255,180,220,0.6)",marginBottom:10,textAlign:"center"}}>あなたの名前を選んでね 💕</div>
        <div style={{position:"relative",marginBottom:14}}>
          <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:16,pointerEvents:"none"}}>🔍</span>
          <input
            type="text"
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="名前を入力して検索..."
            style={{width:"100%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,105,180,0.3)",borderRadius:14,padding:"13px 14px 13px 42px",fontSize:15,color:"white",outline:"none",fontFamily:"inherit"}}
          />
          {search && (
            <button onClick={() => setSearch("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,200,230,0.2)",border:"none",borderRadius:"50%",width:22,height:22,color:"white",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          )}
        </div>
        {filtered.length === 0 && (
          <div style={{textAlign:"center",color:"rgba(255,200,230,0.4)",fontSize:13,padding:"20px 0"}}>「{search}」は見つかりませんでした</div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {filtered.map(c => {
            const r = getILRank(c.il);
            const emoji = c.il >= 25 ? "🌟" : c.il >= 15 ? "⭐" : c.il >= 8 ? "🌙" : "💫";
            return (
              <button key={c.id} className="btn-tap" onClick={() => onSelect(c)}
                style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,100,200,0.2)",borderRadius:16,padding:"16px 10px",textAlign:"center",cursor:"pointer",color:"white"}}>
                <div style={{fontSize:24,marginBottom:4}}>{emoji}</div>
                <div style={{fontSize:15,fontWeight:700,color:"white"}}>{c.name}</div>
                <div style={{fontSize:11,color:r.color,marginTop:3}}>{r.name}</div>
                <div style={{fontSize:10,color:"rgba(255,200,230,0.35)",marginTop:2}}>🔐 PIN保護</div>
              </button>
            );
          })}
        </div>
        <div style={{textAlign:"center",marginTop:28}}>
          <button onClick={onAdminClick} className="btn-tap" style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,200,230,0.1)",borderRadius:10,padding:"9px 20px",color:"rgba(255,200,230,0.3)",fontSize:11,cursor:"pointer"}}>⚙️ 管理者</button>
        </div>
      </div>
    </div>
  );
}

// ─── Particles ───────────────────────────────────────
function Particle({x, color}) {
  return <div style={{position:"fixed",left:x+"%",top:"45%",width:10,height:10,borderRadius:"50%",background:color,pointerEvents:"none",zIndex:1000,animation:"float-up 0.9s ease-out forwards"}} />;
}

// ─── Public Ranking ───────────────────────────────────────
function PublicRanking({casts, onBack}) {
  return (
    <div style={{background:"linear-gradient(160deg,#0a0015,#1a0030,#0d0020)",minHeight:"100vh",paddingBottom:40}}>
      <div style={{background:"rgba(10,0,21,0.85)",borderBottom:"1px solid rgba(255,100,200,0.18)",padding:"16px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:50,backdropFilter:"blur(12px)"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"rgba(255,180,220,0.5)",fontSize:22,cursor:"pointer"}}>←</button>
        <div style={{fontSize:17,fontWeight:800}}>🏆 みんなのランキング</div>
      </div>
      <RankingTab casts={casts} myName="" />
    </div>
  );
}

// ─── Main App ───────────────────────────────────────
function App() {
  const [casts, setCasts] = useState(loadCasts);
  const [screen, setScreen] = useState("select");
  const [cast, setCast] = useState(null);
  const [tab, setTab] = useState("home");
  const [checked, setChecked] = useState({});
  const [weekChecked, setWeekChecked] = useState({});
  const [particles, setParticles] = useState([]);

  const spawnParticles = () => {
    const colors = ["#FF69B4","#FFD700","#00CED1","#A78BFA","#4ADE80"];
    const ps = Array.from({length:8}, (_, i) => ({id:Date.now()+i, x:10+Math.random()*80, color:colors[Math.floor(Math.random()*colors.length)]}));
    setParticles(ps);
    setTimeout(() => setParticles([]), 1100);
  };

  if (screen === "adminLogin") return <AdminLogin onLogin={() => setScreen("admin")} onBack={() => setScreen("select")} />;
  if (screen === "admin")      return <AdminPanel casts={casts} setCasts={setCasts} onBack={() => setScreen("select")} />;
  if (screen === "pubranking") return <PublicRanking casts={casts} onBack={() => setScreen("select")} />;
  if (screen === "pin" && cast) return <PinEntry cast={cast} onSuccess={() => { trackEvent('app_login', {cast_name: cast.name, cast_il: cast.il, cast_pv: cast.pv}); setTab("home"); setScreen("game"); }} onBack={() => { setCast(null); setScreen("select"); }} />;
  if (screen === "select")     return <CastSelect casts={casts} onSelect={c => { trackEvent('cast_select', {cast_name: c.name, cast_il: c.il}); setCast(c); setScreen("pin"); }} onAdminClick={() => setScreen("adminLogin")} onRankingClick={() => setScreen("pubranking")} />;

  if (!cast) { setScreen("select"); return null; }
  const rank = getILRank(cast.il);
  const tabs = [
    {id:"home",    icon:"🏠", label:"ホーム"},
    {id:"mission", icon:"🎯", label:"ミッション"},
    {id:"timer",   icon:"⏱",  label:"待機"},
    {id:"learn",   icon:"📖", label:"まなび"},
    {id:"ranking", icon:"🏆", label:"ランキング"},
  ];

  return (
    <div style={{background:"linear-gradient(160deg,#0a0015,#1a0030,#0d0020)",minHeight:"100vh",paddingBottom:88}}>
      {particles.map(p => <Particle key={p.id} x={p.x} color={p.color} />)}
      <div style={{background:"rgba(10,0,21,0.85)",borderBottom:"1px solid rgba(255,100,200,0.18)",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,backdropFilter:"blur(12px)"}}>
        <button onClick={() => { trackEvent('app_logout', {cast_name: cast.name, cast_il: cast.il}); setCast(null); setChecked({}); setWeekChecked({}); setScreen("select"); }} style={{background:"none",border:"none",color:"rgba(255,180,220,0.5)",fontSize:22,cursor:"pointer",padding:"4px 8px 4px 0"}}>←</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:17,fontWeight:800}}>{cast.name}</div>
          <div style={{fontSize:11,color:rank.color,fontWeight:600}}>{rank.name} IL{cast.il}点</div>
        </div>
        <div style={{fontSize:24}}>{cast.il >= 25 ? "🌟" : cast.il >= 15 ? "⭐" : "💫"}</div>
      </div>
      <div style={{overflowY:"auto",maxHeight:"calc(100vh - 140px)"}}>
        {tab === "home"    && <HomeTab cast={cast} rank={rank} />}
        {tab === "mission" && <MissionTab checked={checked} setChecked={setChecked} weekChecked={weekChecked} setWeekChecked={setWeekChecked} onCheck={spawnParticles} />}
        {tab === "timer"   && <TimerTab checked={checked} cast={cast} />}
        {tab === "learn"   && <LearnTab />}
        {tab === "ranking" && <RankingTab casts={casts} myName={cast.name} />}
        {tab === "tips"    && <TipsTab />}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(8,0,18,0.96)",borderTop:"1px solid rgba(255,100,200,0.18)",display:"flex",backdropFilter:"blur(12px)",zIndex:50}}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => { trackEvent('tab_switch', {tab_name: t.id, cast_name: cast.name, cast_il: cast.il}); setTab(t.id); }} className="btn-tap"
            style={{flex:1,background:"none",border:"none",padding:"8px 2px 14px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
            {tab === t.id && <div style={{position:"absolute",top:0,left:"15%",right:"15%",height:2,background:"linear-gradient(90deg,#FF69B4,#FFD700)",borderRadius:2}} />}
            <span style={{fontSize:19}}>{t.icon}</span>
            <span style={{fontSize:9,color:tab === t.id ? "#FF69B4" : "rgba(255,180,220,0.35)",fontWeight:tab === t.id ? 700 : 400}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
