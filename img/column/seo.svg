<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <!-- Search icon -->
  <circle cx="600" cy="280" r="80" stroke="white" stroke-width="6" opacity="0.2"/>
  <line x1="660" y1="340" x2="700" y2="380" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.2"/>
  <!-- Graph bars -->
  <rect x="490" y="320" width="30" height="60" rx="4" fill="white" opacity="0.12"/>
  <rect x="530" y="290" width="30" height="90" rx="4" fill="white" opacity="0.15"/>
  <rect x="570" y="260" width="30" height="120" rx="4" fill="white" opacity="0.18"/>
  <rect x="610" y="240" width="30" height="140" rx="4" fill="white" opacity="0.22"/>
  <rect x="650" y="210" width="30" height="170" rx="4" fill="white" opacity="0.25"/>
  <!-- Category label -->
  <rect x="480" y="440" width="240" height="48" rx="24" fill="white" opacity="0.15"/>
  <text x="600" y="472" font-family="'Noto Sans JP',sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">SEO対策</text>
</svg>
