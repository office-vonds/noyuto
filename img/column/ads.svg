<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <!-- Chart -->
  <polyline points="400,380 480,340 540,360 600,300 660,260 720,220 800,180" stroke="white" stroke-width="4" fill="none" opacity="0.25" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data points -->
  <circle cx="400" cy="380" r="6" fill="white" opacity="0.3"/>
  <circle cx="540" cy="360" r="6" fill="white" opacity="0.3"/>
  <circle cx="660" cy="260" r="6" fill="white" opacity="0.3"/>
  <circle cx="800" cy="180" r="6" fill="white" opacity="0.3"/>
  <!-- Target icon -->
  <circle cx="600" cy="300" r="60" stroke="white" stroke-width="3" opacity="0.12"/>
  <circle cx="600" cy="300" r="40" stroke="white" stroke-width="3" opacity="0.12"/>
  <circle cx="600" cy="300" r="20" stroke="white" stroke-width="3" opacity="0.12"/>
  <circle cx="600" cy="300" r="6" fill="white" opacity="0.25"/>
  <!-- Category label -->
  <rect x="480" y="440" width="240" height="48" rx="24" fill="white" opacity="0.15"/>
  <text x="600" y="472" font-family="'Noto Sans JP',sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">広告運用</text>
</svg>
