<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="white" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <!-- Browser window -->
  <rect x="380" y="180" width="440" height="280" rx="12" fill="white" opacity="0.12"/>
  <rect x="380" y="180" width="440" height="36" rx="12" fill="white" opacity="0.08"/>
  <circle cx="404" cy="198" r="5" fill="#ef4444" opacity="0.5"/>
  <circle cx="420" cy="198" r="5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="436" cy="198" r="5" fill="#22c55e" opacity="0.5"/>
  <!-- Content lines -->
  <rect x="410" y="240" width="180" height="12" rx="6" fill="white" opacity="0.15"/>
  <rect x="410" y="264" width="280" height="8" rx="4" fill="white" opacity="0.08"/>
  <rect x="410" y="282" width="240" height="8" rx="4" fill="white" opacity="0.08"/>
  <rect x="410" y="310" width="120" height="32" rx="6" fill="white" opacity="0.12"/>
  <!-- Code brackets -->
  <text x="500" y="400" font-family="monospace" font-size="48" fill="white" opacity="0.08">&lt;/&gt;</text>
  <!-- Category label -->
  <rect x="480" y="440" width="240" height="48" rx="24" fill="white" opacity="0.15"/>
  <text x="600" y="472" font-family="'Noto Sans JP',sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">Web制作</text>
</svg>
